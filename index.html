<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JABBAR TV</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%); 
            color: white; font-family: sans-serif; margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-box {  
            background: #E50914; width: 80px; height: 80px;  
            margin: 0 auto 20px; line-height: 80px; font-size: 50px; font-weight: bold;  
            border-radius: 15px; box-shadow: 0px 0px 20px #ff0000; text-align: center;
        }
        #login-section { text-align: center; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; text-align: center; font-size: 16px; box-sizing: border-box; }
        .stButton { background: #E50914; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }

        /* شريط اللغة العلوي */
        .lang-switch { position: absolute; top: 15px; left: 15px; background: #222; color: white; border: 1px solid #444; padding: 5px; border-radius: 5px; cursor: pointer; z-index: 1000; }

        /* واجهة السينما */
        #cinema-content { display: none; width: 100%; max-width: 1000px; text-align: center; padding: 20px; animation: fadeIn 0.5s; }
        .header-bar { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #222; }
        .tab-btn { background: none; border: none; color: #888; font-weight: bold; cursor: pointer; padding: 10px; font-size: 16px; transition: 0.3s; }
        .tab-btn.active { color: #E50914; border-bottom: 3px solid #E50914; }

        .section-content { display: none; }
        .section-content.active { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
