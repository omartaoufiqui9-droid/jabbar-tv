<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JABBAR TV | دخول</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%); 
            color: white; font-family: sans-serif; margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .logo { 
            background: #E50914; width: 80px; height: 80px; line-height: 80px; 
            margin: 0 auto 20px; border-radius: 15px; font-size: 50px; font-weight: bold;
            box-shadow: 0 0 20px #ff0000; text-align: center;
        }
        /* شاشة الدخول */
        #login-box { text-align: center; background: rgba(0,0,0,0.85); padding: 40px; border-radius: 20px; border: 1px solid #444; width: 90%; max-width: 400px; }
        input { width: 90%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; text-align: center; font-size: 16px; }
        button { background: #E50914; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 95%; font-size: 18px; transition: 0.3s; }
        button:hover { background: #b20710; transform: scale(1.05); }
        
        /* واجهة الأفلام (تكون مخفية) */
        #cinema-content { display: none; width: 100%; text-align: center; padding: 20px; animation: fadeIn 1s; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid #333; }
        video { width: 100%; border-radius: 10px; background: #000; }
        
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div id="login-box">
        <div class="logo">J</div>
        <h1>JABBAR TV</h1>
        <p>مرحباً بك.. ادخل اسمك للمتابعة</p>
        <input type="text" id="userName" placeholder="اكتب اسمك هنا...">
        <br>
        <button onclick="startCinema()">دخول للمكتبة</button>
