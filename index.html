<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JABBAR TV</title>
    <style>
        /* نفس التصميم الذي طلبته بالضبط */
        body { 
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%); 
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .logo-box {  
            display: block; margin: 30px auto 10px; width: 80px; height: 80px;  
            background: #E50914; color: white; text-align: center;  
            line-height: 80px; font-size: 50px; font-weight: bold;  
            border-radius: 15px; box-shadow: 0px 0px 20px #ff0000;
        }
        .main-title { font-size: 40px; margin-bottom: 5px; text-align: center; }
        .welcome-text { color: #888; text-align: center; margin-bottom: 30px; }
        
        /* واجهة الدخول */
        #login-section { width: 90%; max-width: 400px; text-align: center; background: rgba(0,0,0,0.5); padding: 30px; border-radius: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; text-align: center; font-size: 16px; box-sizing: border-box; }
        .stButton { background-color: #E50914; color: white; font-weight: bold; width: 100%; border-radius: 10px; height: 45px; border: none; cursor: pointer; font-size: 16px; }

        /* واجهة الأقسام (Tabs) */
        #main-content { display: none; width: 100%; max-width: 1000px; padding: 20px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #888; padding: 10px 20px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .tab-btn.active { color: #E50914; border-bottom: 3px solid #E50914; }

        /* مكتبة الأفلام */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .movie-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; transition: 0.3s; }
        .movie-box:hover { border-color: #E50914; transform: translateY(-5px); }
        video { width: 100%; border-radius: 10px; margin-top: 10px; }
        
        /* شريط اللغة العلوي */
        .lang-switch { position: absolute; top: 10px; left: 10px; background: #222; color: white; border: 1px solid #444; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <select class="lang-switch" id="langSelect" onchange="changeLang()">
        <option value="ar">العربية</option>
        <option value="fr">Français</option>
    </select>

    <div id="login-section">
        <div class="logo-box">J</div>
        <h1 class="main-title">JABBAR TV</h1>
        <p class="welcome-text" id="welcomeMsg">سينما منزلك الخاصة</p>
        <input type="text" id="userName" placeholder="أدخل اسمك للمشاهدة...">
        <button class="stButton" id="loginBtn" onclick="login()">دخول للمكتبة</button>
    </div>

    <div id="main-content">
        <div class="logo-box" style="width:50px; height:50px; line-height:50px; font-size:30px;">J</div>
        <h2 id="userWelcome" style="text-align:center;"></h2>
        
        <div class="tabs">
            <button class="tab-btn active" id="tabMovies">🎬 قسم الأفلام</button>
            <button class="tab-btn" id="tabSeries">📺 قسم المسلسلات</button>
            <button class="tab-btn" id="tabKids">🐥 أفلام كرتون</button>
        </div>

        <div class="grid" id="movieGrid">
            <div class="movie-box">
                <h3>تجربة فيلم 1</h3>
                <video controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
            </div>
            <div class="movie-box">
                <h3>تجربة فيلم 2</h3>
                <video controls src="https://media.w3.org/2010/05/sintel/trailer.mp4"></video>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            ar: { welcome: "سينما منزلك الخاصة", label: "أدخل اسمك للمشاهدة:", btn: "دخول للمكتبة", m: "🎬 قسم الأفلام", s: "📺 قسم المسلسلات", k: "🐥 أفلام كرتون", hello: "مرحباً يا " },
            fr: { welcome: "VOTRE CINÉMA À DOMICILE", label: "Entrez votre nom :", btn: "ACCÉDER", m: "🎬 Section Films", s: "📺 Section Séries", k: "🐥 Dessins Animés", hello: "Bienvenue " }
        };

        function changeLang() {
            const l = document.getElementById('langSelect').value;
            document.getElementById('welcomeMsg').innerText = translations[l].welcome;
            document.getElementById('userName').placeholder = translations[l].label;
            document.getElementById('loginBtn').innerText = translations[l].btn;
            document.getElementById('tabMovies').innerText = translations[l].m;
            document.getElementById('tabSeries').innerText = translations[l].s;
            document.getElementById('tabKids').innerText = translations[l].k;
        }

        function login() {
            const name = document.getElementById('userName').value;
            const l = document.getElementById('langSelect').value;
            if (name.trim() !== "") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('userWelcome').innerText = translations[l].hello + name;
                document.body.style.display = 'block';
            } else {
                alert(document.getElementById('langSelect').value === 'ar' ? "يرجى إدخال الاسم" : "Entrez votre nom");
            }
        }
    </script>
</body>
</html>
